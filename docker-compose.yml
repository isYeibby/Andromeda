services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - vibe_net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_SPOTIFY_CLIENT_ID=${VITE_SPOTIFY_CLIENT_ID}
        - VITE_REDIRECT_URI=${VITE_REDIRECT_URI}
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      # Vite dev server proxy target (server-side only, NOT embedded in browser JS)
      - PROXY_TARGET=http://server:3001
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_SPOTIFY_CLIENT_ID=${VITE_SPOTIFY_CLIENT_ID}
      - VITE_REDIRECT_URI=${VITE_REDIRECT_URI}
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - server
    networks:
      - vibe_net
    restart: unless-stopped

networks:
  vibe_net:
    driver: bridge

volumes:
  server_node_modules:
  client_node_modules:
